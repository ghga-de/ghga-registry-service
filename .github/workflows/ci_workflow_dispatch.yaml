name: Build on PR or dispatch

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled

permissions:
  id-token: write
  contents: read

jobs:
  fetch-tag:
    name: Fetch Tag
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || ( github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'build') ) || ( github.event.action == 'labeled' && github.event.label.name == 'build' )
    steps:
      - id: fetch-tag
        uses: ghga-de/gh-action-fetch-tag@v2
    outputs:
      latest_tag: ${{ steps.fetch-tag.outputs.latest_tag }}

  push_to_docker_hub:
    name: Push to Docker Hub
    needs: fetch-tag
    uses: ghga-de/gh-action-ci/.github/workflows/docker.yml@feature/reusable_workflow
    with:
      tag: ${{ needs.fetch-tag.outputs.latest_tag }}-${{ github.sha }}
    secrets: inherit
