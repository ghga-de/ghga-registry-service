---
name: CI on release

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  push_to_docker_hub:
    strategy:
      matrix:
        flavor: ["", "debian"]
    uses: ghga-de/gh-action-ci/.github/workflows/docker.yml@a37a385f600e5f9159fa8b0f470d944e20255daf
    with:
      tag: ${{ github.event.release.tag_name }}
      flavor: ${{ matrix.flavor }}
      dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
    secrets: inherit
