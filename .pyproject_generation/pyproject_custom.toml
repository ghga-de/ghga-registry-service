[project]
name = "srs"
version = "0.1.0"
description = "Study Registry Service - a service for ingesting and archiving metadata from data submitters."
dependencies = [
    "typer >= 0.21.1",
    "ghga-service-commons[api,auth] >= 7.0",
    "ghga-event-schemas ~= 12.0",
    "hexkit[akafka,mongodb,opentelemetry] >= 8.1",
]

[project.urls]
Repository = "https://github.com/ghga-de/study-repository-service"

[project.scripts]
srs = "srs.__main__:cli"
