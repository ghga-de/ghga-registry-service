components:
  schemas:
    FileIdMappingRequest:
      description: Request body for posting file ID mappings.
      properties:
        mapping:
          description: Map of file accession PIDs to internal file IDs.
          patternProperties:
            ^GHGAF.+:
              format: uuid4
              type: string
          title: Mapping
          type: object
        study_pid:
          description: Identifier of the study to which the file accessions belong.
          maxLength: 256
          minLength: 1
          title: Study Pid
          type: string
      required:
      - study_pid
      - mapping
      title: FileIdMappingRequest
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
  securitySchemes:
    HTTPBearer:
      scheme: bearer
      type: http
info:
  description: A service for ingesting and archiving metadata from data submitters.
  title: Study Repository Service
  version: 0.1.0
openapi: 3.1.0
paths:
  /file-ids/{study_pid}:
    post:
      description: Store file accession to internal file ID mappings.
      operationId: postFilenames
      parameters:
      - in: path
        name: study_pid
        required: true
        schema:
          maxLength: 256
          minLength: 1
          title: Study Pid
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileIdMappingRequest'
        required: true
      responses:
        '204':
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Post file ID mappings
      tags:
      - StudyRepositoryService
      - files
  /health:
    get:
      description: Used to test if this service is alive
      operationId: health
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: health
      tags:
      - StudyRepositoryService
      - health
tags:
- name: StudyRepositoryService
